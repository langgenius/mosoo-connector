  agent-manifest:
    use: manifest
    aliases: [agent-manifest]
    short: "Get an agent manifest"
    long: "Read the current remote Agent manifest through the raw Console GraphQL API. Prefer `mosoo agent manifest probe`, `mosoo agent manifest diff`, and `mosoo agent manifest apply` for editable YAML workflows."
    example: |
      mosoo console agents manifest --app-id <app-id> --agent-id <agent-id> -o json
    hidden: true
    notes:
      - "Raw API command. The product workflow command is `mosoo agent manifest probe`."
      - "Uses POST /graphql on the console default hostname (/api)."
      - "Pull this before changing Agent config; treat the returned manifest/YAML as the source of truth."
    known_errors:
      - status: 401
        cause: "Missing, invalid, or revoked personal access token."
