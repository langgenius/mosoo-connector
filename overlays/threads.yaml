commands:
  archive:
    short: "Archive a thread"
    long: "Mark a thread as archived."
    example: |
      mosoo public-thread-api threads archive --thread-id <thread-id>
  create:
    short: "Create a thread for an agent"
    long: "Create a new thread against an agent API endpoint."
    example: |
      mosoo public-thread-api threads create --agent-id <agent-id> --file body.json
    examples:
      - summary: "Create a Thread with an initial user message and capture the Thread ID."
        command: "mosoo public-thread-api threads create --agent-id <agent-id> --file thread-create.json -o json"
        body_shape:
          client_external_ref: demo-thread-001
          input:
            type: user.message
            content:
              -
                type: text
                text: "Say hello from the API."
        output_hints:
          id_path: thread.id
        follow_up_commands:
          - "mosoo public-thread-api threads retrieve --thread-id <thread-id> -o json"
          - "mosoo public-thread-api events list-events --thread-id <thread-id> -o json"
      - summary: "Create a Thread with a file uploaded through the Agent endpoint."
        command: "mosoo public-thread-api threads create --agent-id <agent-id> --file thread-create-with-file.json -o json"
        body_shape:
          input:
            type: user.message
            content:
              -
                type: text
                text: "Summarize the attachment."
          resources:
            -
              type: file
              file_id: "<file-id>"
        output_hints:
          id_path: thread.id
        follow_up_commands:
          - "mosoo public-thread-api events list-events --thread-id <thread-id> -o json"
    known_errors:
      - status: 404
        cause: "Agent not found or not accessible to this token."
  delete:
    short: "Delete a thread"
    long: "Permanently delete a thread owned by this caller."
    example: |
      mosoo public-thread-api threads delete --thread-id <thread-id>
  delete-file:
    short: "Delete a file"
    long: "Delete a pre-thread draft file or a file attached to a writable thread."
    example: |
      mosoo public-thread-api files delete-file --file-id <file-id> -o json
  download:
    short: "Download file content"
    long: "Download the bytes of a ready thread attachment or agent artifact."
    example: |
      mosoo public-thread-api files download --file-id <file-id> -o raw
  list-events:
    short: "List thread events"
    long: "Return recent events for a thread on the Public Thread API."
    example: |
      mosoo public-thread-api events list-events --thread-id <thread-id>
    known_errors:
      - status: 401
        cause: "Invalid personal access token."
      - status: 404
        cause: "Thread not found for this caller."
  list-files:
    short: "List thread files"
    long: "List files attached to a thread."
    example: |
      mosoo public-thread-api files list-files --thread-id <thread-id>
  list-for-agent:
    short: "List threads for an agent"
    long: "List threads created against an agent API endpoint."
    example: |
      mosoo public-thread-api threads list-for-agent --agent-id <agent-id>
  remove:
    short: "Remove a thread file"
    long: "Detach a file from a thread."
    example: |
      mosoo public-thread-api files remove --thread-id <thread-id> --file-id <file-id>
  retrieve:
    short: "Retrieve a thread"
    long: "Fetch thread metadata and status."
    example: |
      mosoo public-thread-api threads retrieve --thread-id <thread-id>
  retrieve-file:
    short: "Retrieve file metadata"
    long: "Retrieve public metadata for a draft or thread file."
    example: |
      mosoo public-thread-api files retrieve-file --file-id <file-id> -o json
  send:
    short: "Send events to a thread"
    long: "Send user messages, permission decisions, or interrupts to a thread session."
    example: |
      mosoo public-thread-api events send --thread-id <thread-id> --file events.json
    examples:
      - summary: "Send a user message event to an existing thread."
        command: "mosoo public-thread-api events send --thread-id <thread-id> --file events.json -o json"
        body_shape:
          events:
            -
              type: user_message
              text: "Continue the task with this follow-up."
              clientRequestId: cli-send-001
        output_hints:
          list_path: events
        follow_up_commands:
          - "mosoo public-thread-api events list-events --thread-id <thread-id> -o json"
    known_errors:
      - status: 401
        cause: "Invalid personal access token."
      - status: 409
        cause: "Idempotency key reused while the original request is still processing."
  stream:
    short: "Stream thread events (SSE)"
    long: "Open a Server-Sent Events stream of thread events. Use -o raw for the event stream."
    example: |
      mosoo public-thread-api events stream --thread-id <thread-id> -o raw
  unarchive:
    short: "Unarchive a thread"
    long: "Restore an archived thread to the active list."
    example: |
      mosoo public-thread-api threads unarchive --thread-id <thread-id>
  upload:
    short: "Upload a file for an agent"
    long: "Upload one file before creating or continuing a thread, then reference the returned file ID in resources[].file_id."
    example: |
      mosoo public-thread-api files upload --agent-id <agent-id> --file <path>
    examples:
      - summary: "Upload a file and capture the draft file ID for a thread request."
        command: "mosoo public-thread-api files upload --agent-id <agent-id> --file <path> -o json"
        output_hints:
          id_path: file.id
        follow_up_commands:
          - "mosoo public-thread-api threads create --agent-id <agent-id> --file thread-create.json -o json"
    known_errors:
      - status: 401
        cause: "Invalid personal access token."
      - status: 400
        cause: "The multipart request must contain exactly one file field."
      - status: 413
        cause: "The upload exceeds the Public API file size limit."
