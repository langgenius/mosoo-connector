sources:
  threads:
    display_name: public-thread-api
    default_hostname: http://127.0.0.1:8787/api/v1
    repo_url: https://github.com/langgenius/mosoo.git
    pinned_tag: local-snapshot
    backend: openapi3
    openapi3:
      files:
        - docs/openapi/public-thread-api.openapi.json
  console:
    display_name: console
    default_hostname: http://127.0.0.1:8787/api
    repo_url: https://github.com/langgenius/mosoo.git
    pinned_tag: local-snapshot
    backend: graphql
    graphql:
      schema: docs/graphql/console.graphql
      expose:
        queries:
          - accessibleAgentList
          - agent
          - agentChannelBindingList
          - agentCostCard
          - agentEditorState
          - agentManifest
          - agentSessionDiagnostics
          - agentSessionList
          - agentSessionRetrieve
          - appCostCard
          - appEnvironmentList
          - appInfo
          - appList
          - appSkillList
          - availableAgentModels
          - environment
          - exportAgentPackage
          - fileList
          - listSessionResources
          - mcpOAuthFlowStatus
          - mcpRegistry
          - organizationBillingCostCard
          - session
          - sessionList
          - sessionMessages
          - sessionProcessEvents
          - skillDetail
          - threadAgentSessionList
          - threadAgentSessionRetrieve
          - threadSessionMessages
          - threadSessionProcessEvents
          - vendorCredentialList
          - viewer
        mutations:
          - addSessionResource
          - archiveAgentSession
          - autoTitleSession
          - connectMcpBearer
          - createAgent
          - createAgentFork
          - createAgentSession
          - createApp
          - createAppMcpServer
          - createDiscordAgentChannelBinding
          - createEnvironmentFork
          - createLarkAgentChannelBinding
          - createSkillFork
          - createSlackAgentChannelBinding
          - createTelegramAgentChannelBinding
          - createVendorCredential
          - deleteAgent
          - deleteAgentChannelBinding
          - deleteAgentSession
          - deleteEnvironment
          - deleteMcpServer
          - deleteOwnedSkill
          - deleteVendorCredential
          - importAgentPackage
          - onboardingBootstrap
          - pollLarkAgentChannelRegistration
          - pollWeChatAgentChannelPairing
          - prewarmAgentSession
          - publishAgent
          - recreateSandbox
          - removeSessionResource
          - renameApp
          - renameSession
          - resetAgentState
          - restartDriver
          - revokeMcpCredential
          - setAppDefaultEnvironment
          - setDefaultVendorCredential
          - setEnvironmentVariableValue
          - setMcpServerEnabled
          - setSystemAgentModel
          - startLarkAgentChannelRegistration
          - startMcpOAuth
          - startWeChatAgentChannelPairing
          - testVendorCredential
          - unarchiveAgentSession
          - unpublishAgent
          - updateAgentConfig
          - updateProfile
          - updateVendorCredential
      groups:
        - match:
            - appInfo
          group: Common
        - match:
            - accessibleAgentList
            - agent
            - agentEditorState
            - agentManifest
            - exportAgentPackage
            - createAgentFork
            - createAgent
            - deleteAgent
            - importAgentPackage
            - publishAgent
            - recreateSandbox
            - resetAgentState
            - restartDriver
            - unpublishAgent
            - updateAgentConfig
          group: Agents
        - match:
            - agentChannelBindingList
            - createDiscordAgentChannelBinding
            - createLarkAgentChannelBinding
            - createSlackAgentChannelBinding
            - createTelegramAgentChannelBinding
            - pollLarkAgentChannelRegistration
            - pollWeChatAgentChannelPairing
            - startLarkAgentChannelRegistration
            - startWeChatAgentChannelPairing
            - deleteAgentChannelBinding
          group: Channels
        - match:
            - agentCostCard
            - organizationBillingCostCard
            - appCostCard
          group: Cost
        - match:
            - environment
            - appEnvironmentList
            - createEnvironmentFork
            - deleteEnvironment
            - setEnvironmentVariableValue
            - setAppDefaultEnvironment
          group: Environments
        - match:
            - fileList
          group: Files
        - match:
            - mcpOAuthFlowStatus
            - mcpRegistry
            - connectMcpBearer
            - createAppMcpServer
            - deleteMcpServer
            - revokeMcpCredential
            - setMcpServerEnabled
            - startMcpOAuth
          group: MCP
        - match:
            - onboardingBootstrap
          group: Onboarding
        - match:
            - appList
            - createApp
            - renameApp
          group: Apps
        - match:
            - agentSessionDiagnostics
            - agentSessionRetrieve
            - session
            - sessionMessages
            - sessionProcessEvents
            - threadAgentSessionList
            - threadAgentSessionRetrieve
            - threadSessionMessages
            - threadSessionProcessEvents
            - listSessionResources
            - sessionList
            - agentSessionList
            - addSessionResource
            - createAgentSession
            - prewarmAgentSession
            - archiveAgentSession
            - autoTitleSession
            - deleteAgentSession
            - renameSession
            - removeSessionResource
            - unarchiveAgentSession
          group: Sessions
        - match:
            - appSkillList
            - skillDetail
            - createSkillFork
            - deleteOwnedSkill
          group: Skills
        - match:
            - viewer
            - setSystemAgentModel
            - updateProfile
          group: User
        - match:
            - availableAgentModels
            - vendorCredentialList
            - createVendorCredential
            - deleteVendorCredential
            - setDefaultVendorCredential
            - testVendorCredential
            - updateVendorCredential
          group: Credentials
      selection:
        max_depth: 3
  consolerest:
    display_name: console-rest
    default_hostname: http://127.0.0.1:8787/api
    repo_url: https://github.com/langgenius/mosoo.git
    pinned_tag: local-snapshot
    backend: openapi3
    openapi3:
      files:
        - docs/openapi/console-rest.openapi.json
