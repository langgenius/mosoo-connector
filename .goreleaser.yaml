version: 2

project_name: mosoo

before:
  hooks:
    - rm -rf .cache/goreleaser-skill
    - mkdir -p .cache/goreleaser-skill/mosoo
    - cp publish/skills/mosoo/SKILL.md .cache/goreleaser-skill/mosoo/SKILL.md
    - cp -R publish/skills/mosoo/references .cache/goreleaser-skill/mosoo/references

builds:
  - id: mosoo
    main: ./cmd/mosoo
    binary: mosoo
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/lathe-cli/lathe/pkg/lathe.Version={{ .Tag }} -X github.com/lathe-cli/lathe/pkg/lathe.Commit={{ .Commit }} -X github.com/lathe-cli/lathe/pkg/lathe.Date={{ .Date }}

archives:
  - id: cli
    ids:
      - mosoo
    name_template: mosoo-{{ .Os }}-{{ .Arch }}
    formats:
      - tar.gz
  - id: skill
    meta: true
    name_template: mosoo-skill
    formats:
      - tar.gz
    files:
      - src: .cache/goreleaser-skill/mosoo
        dst: mosoo

checksum:
  name_template: checksums.txt

brews:
  - name: mosoo
    ids:
      - cli
    repository:
      owner: langgenius
      name: mosoo-connector
      branch: "homebrew/{{ .ProjectName }}-{{ .Version }}"
      pull_request:
        enabled: true
        base:
          owner: langgenius
          name: mosoo-connector
          branch: main
    directory: Formula
    commit_msg_template: "chore(homebrew): update mosoo to {{ .Tag }}"
    homepage: "https://github.com/langgenius/mosoo-connector"
    description: "Generated CLI for Mosoo integrators"
    test: |
      assert_match "mosoo {{ .Tag }}", shell_output("#{bin}/mosoo --version")
      system "#{bin}/mosoo", "commands", "--json"
